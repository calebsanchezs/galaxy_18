<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Cartas Para Ti ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #fff5f7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Contenedor de Pétalos */
        #petals-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Título Principal */
        .main-title {
            color: #ff4d6d;
            margin-bottom: 50px;
            font-size: 2.2rem;
            z-index: 2;
            font-family: 'Dancing Script', cursive;
            text-align: center;
        }

        /* Contenedor de Sobres */
        .envelope-wrapper {
            display: flex;
            gap: 30px;
            z-index: 2;
            flex-wrap: wrap;
            justify-content: center;
        }

        .envelope-option {
            width: 220px;
            height: 150px;
            background: white;
            border-bottom: 5px solid #ff4d6d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-radius: 8px;
            position: relative;
        }

        .envelope-option:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.2);
        }

        .envelope-option .icon { font-size: 3rem; margin-bottom: 5px; }
        .envelope-option span { font-weight: 600; color: #ff4d6d; letter-spacing: 1px; }

        /* Overlay de la Carta */
        .letter-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .letter-paper {
            background: white;
            width: 100%;
            max-width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
            box-shadow: 0 15px 45px rgba(0,0,0,0.2);
            border-left: 6px solid #ff4d6d;
            animation: openLetter 0.5s ease-out;
        }

        @keyframes openLetter {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            background: #fff5f7; border: none;
            font-size: 1.2rem; cursor: pointer;
            color: #ff4d6d; width: 35px; height: 35px;
            border-radius: 50%;
        }

        .letter-content {
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem;
            line-height: 1.8;
            color: #333;
            text-align: left;
        }

        .letter-content p { margin-bottom: 20px; }

        /* Botón Volver */
        .btn-back {
            position: fixed;
            top: 20px; left: 20px;
            text-decoration: none;
            color: #ff4d6d;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 10;
        }

        /* Animación de Pétalos */
        .petal {
            position: absolute;
            background: #ff4d6d;
            border-radius: 150% 0 150% 0;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="petals-container"></div>

    <a href="inicio.html" class="btn-back">← Volver al Inicio</a>

    <h1 class="main-title">Tengo algo que decirte... ❤️</h1>

    <div class="envelope-wrapper">
        <div class="envelope-option" onclick="openLetter(0)">
            <div class="icon">✉️</div>
            <span>CARTA #1</span>
        </div>
        <div class="envelope-option" onclick="openLetter(1)">
            <div class="icon">✉️</div>
            <span>CARTA #2</span>
        </div>
    </div>

    <div class="letter-overlay" id="letterOverlay">
        <div class="letter-paper">
            <button class="close-btn" onclick="closeLetter()">✕</button>
            <div style="text-align: right; font-size: 0.8rem; color: #888; margin-bottom: 20px;">Abril, 2026</div>
            
            <div id="letterBody" class="letter-content">
                </div>

            <div style="margin-top: 40px; text-align: right; font-family: 'Dancing Script'; font-size: 1.8rem; color: #ff4d6d;">
                Por siempre tuyo,<br>Caleb
            </div>
        </div>
    </div>

    <script>
        // Aquí guardamos los textos
        const cartas = [
            // CARTA 1 (TU TEXTO ORIGINAL)
            `<p>Mi amor,</p>
            <p>Escribo estas palabras porque a veces el corazón se llena tanto de ti que no sabe cómo expresarlo solo con miradas. Desde que llegaste a mi vida, cada día tiene un brillo diferente, un propósito nuevo.</p>
            <p>Eres mi refugio, el amor que siempre soñé. Gracias por caminar a mi lado, por nuestras risas y por hacer que lo ordinario se vuelva extraordinario. No importa cuánto tiempo pase, siempre elegiré perderme en tu sonrisa y encontrarme en tus ojos.</p>
            <p>Esta página, este universo y mi vida entera son tuyos. Te amo más de lo que las palabras pueden explicar.</p>`,

            // CARTA 2 (NUEVA CARTA)
            `<p>Mi vida,</p>
            <p>Apenas llevamos una semana caminando juntos, pero quería decirte que estos siete días han sido suficientes para darme cuenta de lo increíble que eres. Me encanta esa sensación de emoción cada vez que veo un mensaje tuyo.</p>
            <p>Me gusta mucho cómo estamos empezando esto: con risas, conociéndonos y disfrutando de cada detalle. Gracias por estos primeros días de muchos que vendrán. Estoy muy feliz de que hayamos decidido empezar nuestra propia historia.</p>
            <p>Estoy ansioso por descubrir todo lo que el tiempo tiene guardado para nosotros.</p>`
        ];

        function openLetter(index) {
            const overlay = document.getElementById('letterOverlay');
            const body = document.getElementById('letterBody');
            body.innerHTML = cartas[index];
            overlay.style.display = 'flex';
        }

        function closeLetter() {
            document.getElementById('letterOverlay').style.display = 'none';
        }

        // Sistema de Pétalos
        function createPetal() {
            const container = document.getElementById('petals-container');
            const petal = document.createElement('div');
            petal.classList.add('petal');
            const size = Math.random() * 10 + 10 + 'px';
            petal.style.width = size;
            petal.style.height = size;
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 3 + 2 + 's';
            container.appendChild(petal);
            setTimeout(() => petal.remove(), 5000);
        }
        setInterval(createPetal, 300);

        // Cerrar al hacer clic fuera
        window.onclick = function(e) {
            if (e.target == document.getElementById('letterOverlay')) closeLetter();
        }
    </script>
</body>
</html>

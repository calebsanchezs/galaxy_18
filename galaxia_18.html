<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para Mi Universo 🪐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Montserrat', sans-serif;
            position: fixed;
        }

        #canvas-container { width: 100%; height: 100%; display: block; touch-action: none; }

        /* Botón de Entrada Romántico */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        #start-btn {
            background: none;
            border: 2px solid #ff1a1a;
            color: white;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px #ff1a1a;
            letter-spacing: 2px;
            animation: pulseBtn 1.5s infinite;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 10px #ff1a1a; }
            50% { transform: scale(1.1); box-shadow: 0 0 30px #ff1a1a; }
            100% { transform: scale(1); box-shadow: 0 0 10px #ff1a1a; }
        }

        .heart-core {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff1a1a;
            font-size: clamp(2.5rem, 15vw, 6rem);
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(0 0 25px #ff1a1a);
            animation: pulse 0.8s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .ui-controls {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            z-index: 10;
            pointer-events: none;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="start-btn">ABRIR MI CORAZÓN ❤️</button>
        <p style="color: white; margin-top: 20px; font-size: 0.8rem; opacity: 0.6;">(Activa el sonido)</p>
    </div>

    <div class="heart-core">❤️</div>
    <div class="ui-controls">Explora 360° • Zoom con dedos • Toca la pantalla</div>
    <div id="canvas-container"></div>

    <audio id="bg-music" loop>
        <source src="Reik - Creo En Ti (LetraLyrics).mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jupiter, starSystem, textGroup;
        let heartParticles = [];
        let isDragging = false, targetRotX = 0.5, targetRotY = 0;
        let zoomLevel = 1100;
        let initialPinchDist = 0;

        const frases = ["TE AMOOO", "ERES MI VIDA", "TE AMO 18", "MI REINA", "SIEMPRE JUNTOS", "ERES TODO", "MI MUNDO", "MI UNIVERSO"];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 20000);
            camera.position.set(0, 400, 3500); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // JÚPITER
            const jupiterTexture = createJupiterTexture();
            jupiter = new THREE.Mesh(
                new THREE.SphereGeometry(220, 64, 64),
                new THREE.MeshPhongMaterial({ map: jupiterTexture, shininess: 5 })
            );
            scene.add(jupiter);

            // ESTRELLAS 
            const starGeo = new THREE.BufferGeometry();
            const positions = [];
            for (let i = 0; i < 20000; i++) {
                const r = 4000 + Math.random() * 5000;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            starSystem = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 2, transparent: true }));
            scene.add(starSystem);

            // ANILLO DE MENSAJES
            textGroup = new THREE.Group();
            for(let i=0; i<130; i++) {
                const angle = (i / 130) * Math.PI * 2;
                const sprite = createTextSprite(frases[Math.floor(Math.random() * frases.length)]);
                const radius = 380 + Math.random() * 300;
                sprite.position.set(Math.cos(angle)*radius, (Math.random()-0.5)*180, Math.sin(angle)*radius);
                sprite.userData = { angle: angle, radius: radius, speed: 0.001 + (Math.random() * 0.002) };
                textGroup.add(sprite);
            }
            scene.add(textGroup);

            // LUCES
            const sun = new THREE.DirectionalLight(0xffffff, 2);
            sun.position.set(1000, 500, 1000);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x222244, 0.6));

            // INTERACCIÓN MÚSICA Y ZOOM
            const startOverlay = document.getElementById('start-overlay');
            const startBtn = document.getElementById('start-btn');
            const audio = document.getElementById('bg-music');

            startBtn.addEventListener('click', () => {
                audio.play();
                startOverlay.style.opacity = '0';
                setTimeout(() => startOverlay.style.display = 'none', 1000);
                zoomLevel = 1100; // Inicia el acercamiento
            });

            // Zoom PC
            window.addEventListener('wheel', (e) => {
                zoomLevel += e.deltaY * 0.8;
                zoomLevel = Math.max(550, Math.min(zoomLevel, 6000));
            }, { passive: true });

            const container = document.getElementById('canvas-container');
            container.addEventListener('mousedown', (e) => { isDragging = true; createExplosion(e); });
            window.addEventListener('mouseup', () => isDragging = false);
            
            container.addEventListener('mousemove', (e) => {
                if(isDragging) {
                    targetRotY += e.movementX * 0.005;
                    targetRotX += e.movementY * 0.005;
                }
            });

            // Táctil Móvil
            container.addEventListener('touchstart', (e) => {
                isDragging = true;
                if(e.touches.length === 1) createExplosion(e.touches[0]);
                if(e.touches.length === 2) initialPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            }, { passive: false });

            container.addEventListener('touchmove', (e) => {
                if(e.touches.length === 1 && isDragging) {
                    const touch = e.touches[0];
                    if (this.lastTouch) {
                        targetRotY += (touch.pageX - this.lastTouch.pageX) * 0.01;
                        targetRotX += (touch.pageY - this.lastTouch.pageY) * 0.01;
                    }
                    this.lastTouch = touch;
                }
                if(e.touches.length === 2) {
                    const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    zoomLevel -= (dist - initialPinchDist) * 5;
                    zoomLevel = Math.max(550, Math.min(zoomLevel, 6000));
                    initialPinchDist = dist;
                }
            }, { passive: false });

            container.addEventListener('touchend', () => { isDragging = false; this.lastTouch = null; });
            window.addEventListener('resize', onWindowResize);
        }

        function createJupiterTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0,0,0,512);
            grad.addColorStop(0, '#1a0d00'); grad.addColorStop(0.3, '#7c6a4a'); grad.addColorStop(0.5, '#3a2315'); grad.addColorStop(0.7, '#ac9a73'); grad.addColorStop(1, '#1a0d00');
            ctx.fillStyle = grad; ctx.fillRect(0,0,512,512);
            for(let i=0; i<300; i++) { ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.05})`; ctx.fillRect(Math.random()*512, Math.random()*512, Math.random()*150, 1); }
            return new THREE.CanvasTexture(canvas);
        }

        function createTextSprite(txt) {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.font = 'bold 24px Montserrat'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
            ctx.shadowColor = '#ff1a1a'; ctx.shadowBlur = 10;
            ctx.fillText(txt, 128, 40);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, blending: THREE.AdditiveBlending }));
            sprite.scale.set(160, 40, 1);
            return sprite;
        }

        function createExplosion(e) {
            const x = (e.clientX / window.innerWidth) * 2 - 1;
            const y = -(e.clientY / window.innerHeight) * 2 + 1;
            const vector = new THREE.Vector3(x, y, 0.5).unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const pos = camera.position.clone().add(dir.multiplyScalar(600));

            for(let i=0; i<15; i++) {
                const heart = createHeartSprite();
                heart.position.copy(pos);
                heart.velocity = new THREE.Vector3((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
                heart.life = 1.0;
                scene.add(heart);
                heartParticles.push(heart);
            }
        }

        function createHeartSprite() {
            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff1a1a';
            ctx.beginPath(); ctx.moveTo(32, 20); ctx.bezierCurveTo(32, 17, 27, 10, 17, 10, 7, 10, 7, 22.5, 7, 22.5, 7, 30, 17, 40, 32, 50, 47, 40, 57, 30, 57, 22.5, 57, 22.5, 57, 10, 47, 10, 40, 10, 32, 17, 32, 20); ctx.fill();
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
            sprite.scale.set(45, 45, 1);
            return sprite;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.position.z += (zoomLevel - camera.position.z) * 0.05;
            jupiter.rotation.y += 0.002;

            textGroup.children.forEach(t => {
                t.userData.angle += t.userData.speed;
                t.position.x = Math.cos(t.userData.angle) * t.userData.radius;
                t.position.z = Math.sin(t.userData.angle) * t.userData.radius;
                t.lookAt(camera.position);
            });

            heartParticles.forEach((h, i) => {
                h.position.add(h.velocity);
                h.life -= 0.02;
                h.material.opacity = h.life;
                if(h.life <= 0) { scene.remove(h); heartParticles.splice(i, 1); }
            });

            starSystem.rotation.y += (targetRotY - starSystem.rotation.y) * 0.05;
            starSystem.rotation.x += (targetRotX - starSystem.rotation.x) * 0.05;
            jupiter.rotation.x = starSystem.rotation.x;
            jupiter.rotation.y = starSystem.rotation.y + jupiter.rotation.y;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
